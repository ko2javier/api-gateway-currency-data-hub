server:
  port: 7000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: weather-service
          uri: http://localhost:5000
          predicates:
            - Path=/weather/**

        - id: currency-service
          uri: http://localhost:5000
          predicates:
            - Path=/currency/**

        - id: auth-service
          uri: http://localhost:4000
          predicates:
            - Path=/auth/**