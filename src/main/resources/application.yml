server:
  port: 7000

spring:
  application:
    name: api-gateway

  data:
    redis:
      url: ${REDIS_URL}

  cloud:
    gateway:
      routes:
        - id: weather-service
          uri: ${API_SERVICE_URL}
          predicates:
            - Path=/weather/**

        - id: currency-service
          uri: ${API_SERVICE_URL}
          predicates:
            - Path=/currency/**

        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/auth/**

        - id: events-service
          uri: http://ko2-kafka-events:6000
          predicates:
            - Path=/events/**

        - id: openapi-apis
          uri: ${API_SERVICE_URL}
          predicates:
            - Path=/v3/api-docs/apis
          filters:
            - RewritePath=/v3/api-docs/apis, /v3/api-docs

        - id: openapi-auth
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: API Service (Weather & Currency)
        url: /v3/api-docs/apis
      - name: Auth Service
        url: /v3/api-docs/auth

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always